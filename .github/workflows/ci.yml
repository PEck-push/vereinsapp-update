name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vereinspwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vereinspwa/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vereinspwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vereinspwa/package-lock.json
      - run: npm ci
      - run: npm run test

  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vereinspwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vereinspwa/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          NEXT_PUBLIC_CLUB_ID: test-club
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: vereinspwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vereinspwa/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_CLUB_ID: test-club
          NEXT_PUBLIC_APP_URL: http://localhost:3000
